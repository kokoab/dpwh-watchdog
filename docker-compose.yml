services:
  db:
    image: pgvector/pgvector:pg16
    container_name: db_watchdog
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dpwh_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend_watchdog
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ~/.cache/huggingface:/root/.cache/huggingface
    tty: true
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
